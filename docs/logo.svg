<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3c873a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d6b2b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Node 1 -->
  <rect x="10" y="25" width="40" height="40" rx="8" fill="url(#grad)" stroke="#1a4d19" stroke-width="2"/>
  <text x="30" y="50" font-family="monospace" font-size="14" fill="white" text-anchor="middle" font-weight="bold">1</text>
  <!-- Arrow 1 -->
  <line x1="50" y1="45" x2="75" y2="45" stroke="#3c873a" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Arrowhead -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3c873a"/>
    </marker>
  </defs>
  <!-- Node 2 -->
  <rect x="75" y="25" width="40" height="40" rx="8" fill="url(#grad)" stroke="#1a4d19" stroke-width="2"/>
  <text x="95" y="50" font-family="monospace" font-size="14" fill="white" text-anchor="middle" font-weight="bold">2</text>
  <!-- Arrow 2 -->
  <line x1="115" y1="45" x2="140" y2="45" stroke="#3c873a" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Node 3 -->
  <rect x="140" y="25" width="40" height="40" rx="8" fill="url(#grad)" stroke="#1a4d19" stroke-width="2"/>
  <text x="160" y="50" font-family="monospace" font-size="14" fill="white" text-anchor="middle" font-weight="bold">3</text>
  <!-- Label -->
  <text x="100" y="85" font-family="monospace" font-size="10" fill="#666" text-anchor="middle">Linked List</text>
</svg>
